<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA Aplicada | Material de Abril</title>
<style>
  :root {
    --nav: #1A2C3A; --teal: #00949A; --amb: #D4873A; --gris: #F3F6F9; --bd: #C5D2DC; --txt: #2C3E50; --bco: #FFFFFF; --r: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
  body { background: #EEF3F7; color: var(--txt); line-height: 1.6; padding-bottom: 60px; font-size: 20px; }
  header { background: var(--nav); color: var(--bco); padding: 40px 20px; text-align: center; border-bottom: 6px solid var(--amb); }
  header h1 { font-size: 32px; margin-bottom: 10px; text-transform: uppercase; }
  header p { font-size: 22px; opacity: 0.9; max-width: 600px; margin: 0 auto; font-weight: bold; color: #FFF8E1; }
  .container { width: 95%; max-width: 1400px; margin: 40px auto; padding: 0 15px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; }
  .card { background: var(--bco); border-radius: var(--r); padding: 30px; box-shadow: 0 4px 12px rgba(0,0,0,.08); border-top: 5px solid var(--bd); text-decoration: none; color: inherit; display: flex; flex-direction: column; transition: transform 0.2s ease; }
  .card:hover { transform: translateY(-5px); }
  .c-pasada { border-top-color: #4A6080; }
  .c-actual { border-top-color: var(--amb); background: #FFFDF8; }
  .clase-num { font-size: 18px; font-weight: bold; color: #666; text-transform: uppercase; margin-bottom: 8px; }
  .c-actual .clase-num { color: var(--amb); }
  .card h2 { color: var(--nav); font-size: 26px; margin-bottom: 12px; }
  .card p { font-size: 19px; color: #444; flex-grow: 1; }
  .btn { display: inline-block; margin-top: 20px; padding: 12px 15px; border-radius: 8px; font-weight: bold; text-align: center; background: var(--amb); color: white; font-size: 19px; }
  .section-title { font-size: 30px; color: var(--nav); margin: 40px 0 20px 0; padding-bottom: 10px; border-bottom: 3px solid var(--bd); }
</style>
</head>
<body>
<header>
  <h1>Taller de IA Aplicada</h1>
  <p>Material de Estudio - Abril Oreste</p>
</header>
<div class="container">
  <h2 class="section-title">Lunes 13/04/26</h2>
  <div class="grid">
    <a href="clase_6_abril.html" class="card c-actual">
      <div class="clase-num">Semana 4 • Clase 6</div>
      <h2>La IA que no olvida</h2>
      <p>Aprendemos a crear un chat que recuerda lo que hablamos usando listas y bucles.</p>
      <div class="btn">Abrir Clase 6</div>
    </a>
  </div>
  <h2 class="section-title">Clases Anteriores</h2>
  <div class="grid">
    <a href="clase_5_abril.html" class="card c-pasada">
      <div class="clase-num">10/04/26 • Clase 5</div>
      <h2>La Primera Llamada</h2>
      <div class="btn" style="background: #4A6080;">Repasar</div>
    </a>
  </div>
</div>
</body>
</html>
