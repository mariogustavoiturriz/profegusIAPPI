<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Chatbot en la Web</title>
<style>
  :root {
    --nav: #1A2C3A; --teal: #00949A; --gris: #F3F6F9; --txt: #2C3E50;
  }
  body { font-family: 'Segoe UI', sans-serif; background: #EEF3F7; color: var(--txt); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
  
  .chat-container {
    width: 100%;
    max-width: 600px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 85vh;
  }

  .header { background: var(--nav); color: white; padding: 20px; text-align: center; }
  .header h2 { margin: 0; font-size: 22px; }

  /* PANEL DE CONFIGURACIÓN */
  .config-panel { background: #FFF8E1; padding: 15px; border-bottom: 2px solid #FFE082; display: flex; flex-direction: column; gap: 10px; }
  .config-panel input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; outline: none; }
  .config-panel input:focus { border-color: var(--teal); }
  
  .config-row { display: flex; gap: 10px; align-items: center; }
  .config-row label { font-size: 13px; font-weight: bold; color: #555; margin-right: 5px; }

  .chat-history {
    flex-grow: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 15px;
    background: var(--gris);
  }

  .msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.4; }
  .msg-user { align-self: flex-end; background: var(--teal); color: white; border-bottom-right-radius: 2px; }
  .msg-ia { align-self: flex-start; background: white; border: 1px solid #ddd; border-bottom-left-radius: 2px; }
  .msg-sys { align-self: center; background: #FFCDD2; color: #B71C1C; font-size: 14px; padding: 8px 12px; border-radius: 8px; text-align: center;}

  .input-area { display: flex; padding: 15px; background: white; border-top: 1px solid #eee; }
  .input-area input { flex-grow: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; outline: none; font-size: 16px; }
  .input-area button { background: var(--teal); color: white; border: none; padding: 0 20px; margin-left: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; }
  .input-area button:hover { background: #007B80; }
</style>
</head>
<body>

<div class="chat-container">
  <div class="header">
    <h2>🤖 Asistente Web v2.0</h2>
  </div>

  <!-- CAJA DE SEGURIDAD Y CONFIGURACIÓN -->
  <div class="config-panel">
    <input type="password" id="apiKeyInput" placeholder="1. Pegá tu API Key de Groq acá...">
    
    <div class="config-row">
      <input type="text" id="rolInput" placeholder="2. Rol de la IA (Ej: Sos un pirata...)" style="flex-grow: 1;">
      
      <div style="display: flex; align-items: center; background: white; padding: 0 10px; border-radius: 6px; border: 1px solid #ccc;">
        <label for="tempInput">Temp:</label>
        <input type="number" id="tempInput" value="0.7" min="0" max="2" step="0.1" style="width: 60px; border: none; padding: 8px 0;">
      </div>
    </div>
  </div>

  <div class="chat-history" id="chatHistory">
    <div class="msg msg-ia">¡Hola! Configurá mi rol arriba, ajustá la temperatura y empecemos a charlar.</div>
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Escribí tu mensaje..." onkeypress="handleEnter(event)">
    <button onclick="enviarMensaje()">Enviar</button>
  </div>
</div>

<script>
  // La memoria del chat (solo guardamos lo que dice el usuario y la IA)
  let historial = [];

  async function enviarMensaje() {
    const apiKey = document.getElementById('apiKeyInput').value.trim();
    const rolTexto = document.getElementById('rolInput').value.trim();
    const tempValor = parseFloat(document.getElementById('tempInput').value) || 0.7;
    const inputEl = document.getElementById('userInput');
    const mensajeTexto = inputEl.value.trim();

    if (!apiKey) {
      mostrarMensajeSistema("⚠️ Necesitás pegar tu API Key arriba primero.");
      return;
    }
    if (!mensajeTexto) return;

    // 1. Mostrar el mensaje del usuario en pantalla
    mostrarMensaje(mensajeTexto, 'user');
    inputEl.value = ''; // Limpiar cajita

    // 2. Guardar en el historial
    historial.push({"role": "user", "content": mensajeTexto});

    // 3. Mostrar un cartelito de "Pensando..."
    const idPensando = mostrarMensajeSistema("⏳ Conectando con Groq...");

    // 4. Preparar la lista de mensajes final (Inyectamos el System Prompt si existe)
    let mensajesAEnviar = [];
    if (rolTexto) {
      mensajesAEnviar.push({"role": "system", "content": rolTexto});
    }
    // Sumamos el historial al envío
    mensajesAEnviar = mensajesAEnviar.concat(historial);

    // 5. Preparar la conexión a la API
    const url = "https://api.groq.com/openai/v1/chat/completions";
    const payload = {
      "model": "llama-3.3-70b-versatile",
      "temperature": tempValor,
      "messages": mensajesAEnviar
    };

    try {
      const respuesta = await fetch(url, {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${apiKey}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      if (!respuesta.ok) throw new Error("API Key inválida o error de red");

      const datos_json = await respuesta.json();
      const respuestaIA = datos_json.choices[0].message.content;

      // Quitar el cartel de pensando
      document.getElementById(idPensando).remove();

      // Mostrar respuesta y guardar en memoria
      mostrarMensaje(respuestaIA, 'ia');
      historial.push({"role": "assistant", "content": respuestaIA});

    } catch (error) {
      document.getElementById(idPensando).remove();
      mostrarMensajeSistema("❌ Error de conexión. Revisá tu API Key.");
      // Sacamos el último mensaje del historial porque falló
      historial.pop(); 
    }
  }

  // Funciones visuales (El Actuador)
  function mostrarMensaje(texto, sender) {
    const chatHistory = document.getElementById('chatHistory');
    const div = document.createElement('div');
    div.className = `msg msg-${sender}`;
    div.innerText = texto;
    chatHistory.appendChild(div);
    chatHistory.scrollTop = chatHistory.scrollHeight; // Auto-scroll
  }

  function mostrarMensajeSistema(texto) {
    const chatHistory = document.getElementById('chatHistory');
    const div = document.createElement('div');
    const id = 'sys-' + Date.now();
    div.id = id;
    div.className = `msg msg-sys`;
    div.innerText = texto;
    chatHistory.appendChild(div);
    chatHistory.scrollTop = chatHistory.scrollHeight;
    return id;
  }

  function handleEnter(event) {
    if (event.key === "Enter") enviarMensaje();
  }
</script>

</body>
</html>
